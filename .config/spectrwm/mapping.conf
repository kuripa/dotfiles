## Test
bind[menu]              = MOD+p # Open dmenu
bind[flameshot]         = Print # Screenshot
bind[help]              = MOD+F12 # Show help
bind[term]              = MOD+Shift+Return # Open terminal
bind[lock]              = MOD+Shift+Delete # Lock screen
bind[initscr]           = MOD+Shift+i # Reinitialize physical screens
bind[power]             = MOD+F11 # Power menu
bind[quit]              = MOD+Shift+q # Quit spectrwm
bind[restart]           = MOD+q # Restart spectrwm

bind[bar_toggle]        = MOD+b # Toggle bar on all workspaces
bind[bar_toggle_ws]     = MOD+Shift+b # Toggle bar on workspace

bind[button2]           = MOD+v # Fake a middle mouse button click

bind[cycle_layout]      = MOD+space # Cycle layout
bind[flip_layout]       = MOD+Shift+backslash # Swap master and stack area 
bind[float_toggle]      = MOD+t # Toggle float 

bind[focus_main]        = MOD+m # Focus on main window in workspace
bind[focus_next]        = MOD+j # Focus next window in workspace
bind[focus_next]        = MOD+Tab # Focus on next window in workspace
bind[focus_prev]        = MOD+k # Focus on previous window in workspace
bind[focus_prev]        = MOD+Shift+Tab # Focus on previous window in workspace
bind[focus_urgent]      = MOD+u # Focus on urgent window

bind[iconify]           = MOD+w # Minimize currently focused window
bind[uniconify]         = MOD+Shift+w

bind[height_grow]       = MOD+Shift+equal # Grow the height if a floating window
bind[height_shrink]     = MOD+Shift+minus # Shrink the height if a floating window
bind[master_add]        = MOD+comma # Add windows to master area
bind[master_del]        = MOD+period # Remove windows from master area
bind[master_grow]       = MOD+l # Grow master area
bind[master_shrink]     = MOD+h # Shrink master area
bind[maximize_toggle]   = MOD+e # Maximize focused window
bind[move_down]         = MOD+Shift+bracketright # Move floating window downwards
bind[move_left]         = MOD+bracketleft # Move floating window to the left
bind[move_right]        = MOD+bracketright # Move floating window to the right
bind[move_up]           = MOD+Shift+bracketleft # Move floating window upwards

bind[mvrg_1]            = MOD+Shift+KP_End
bind[mvrg_2]            = MOD+Shift+KP_Down
bind[mvrg_3]            = MOD+Shift+KP_Next
bind[mvrg_4]            = MOD+Shift+KP_Left
bind[mvrg_5]            = MOD+Shift+KP_Begin
bind[mvrg_6]            = MOD+Shift+KP_Right
bind[mvrg_7]            = MOD+Shift+KP_Home
bind[mvrg_8]            = MOD+Shift+KP_Up
bind[mvrg_9]            = MOD+Shift+KP_Prior

bind[mvws_1]            = MOD+Shift+1  # Move window to workspace 1 
bind[mvws_2]            = MOD+Shift+2  # Move window to workspace 2 
bind[mvws_3]            = MOD+Shift+3  # Move window to workspace 3  
bind[mvws_4]            = MOD+Shift+4  # Move window to workspace 4 
bind[mvws_5]            = MOD+Shift+5  # Move window to workspace 5 
bind[mvws_6]            = MOD+Shift+6  # Move window to workspace 6 
bind[mvws_7]            = MOD+Shift+7  # Move window to workspace 7 
bind[mvws_8]            = MOD+Shift+8  # Move window to workspace 8 
bind[mvws_9]            = MOD+Shift+9  # Move window to workspace 9 

bind[name_workspace]    = MOD+Shift+slash
bind[raise_toggle]      = MOD+Shift+r

bind[rg_1]              = MOD+KP_End
bind[rg_2]              = MOD+KP_Down
bind[rg_3]              = MOD+KP_Next
bind[rg_4]              = MOD+KP_Left
bind[rg_5]              = MOD+KP_Begin
bind[rg_6]              = MOD+KP_Right
bind[rg_7]              = MOD+KP_Home
bind[rg_8]              = MOD+KP_Up
bind[rg_9]              = MOD+KP_Prior
bind[rg_next]           = MOD+Shift+Right
bind[rg_prev]           = MOD+Shift+Left

bind[search_win]        = MOD+f
bind[search_workspace]	= MOD+slash

bind[stack_dec]         = MOD+Shift+period
bind[stack_inc]         = MOD+Shift+comma
bind[stack_reset]       = MOD+Shift+space
bind[swap_main]         = MOD+Return
bind[swap_next]         = MOD+Shift+j
bind[swap_prev]         = MOD+Shift+k
bind[version]           = MOD+Shift+v
bind[width_grow]        = MOD+equal
bind[width_shrink]      = MOD+minus
bind[wind_del]          = MOD+x
bind[wind_kill]         = MOD+Shift+x

bind[ws_1]              = MOD+1
bind[ws_2]              = MOD+2
bind[ws_3]              = MOD+3
bind[ws_4]              = MOD+4
bind[ws_5]              = MOD+5
bind[ws_6]              = MOD+6
bind[ws_7]              = MOD+7
bind[ws_8]              = MOD+8
bind[ws_9]              = MOD+9
bind[ws_10]             = MOD+0

bind[ws_next]           = MOD+Right
bind[ws_next_all]       = MOD+Up
bind[ws_next_move]      = MOD+Shift+Up
bind[ws_prev]           = MOD+Left
bind[ws_prev_all]       = MOD+Down
bind[ws_prev_move]      = MOD+Shift+Down
bind[ws_prior]          = MOD+a
